<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HPBD</title>
    <link rel="stylesheet" href="banner_styles.css" />
    <link rel="icon" type="image/x-icon" href="./birthdayCake.png">
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <script
      src="https://code.jquery.com/jquery-3.7.1.min.js"
      integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div id="wrapper">
      <div class="flag__birthday">
        <img src="./images/1.png" alt="" width="350" class="flag__left" />
        <img src="./images/1.png" alt="" width="350" class="flag__right" />
      </div>
      <div class="content">
        <div class="left">
          <div class="title">
            <h1 class="happy">
              <span style="--t: 4s;">H</span>
              <span style="--t: 4.2s;">a</span>
              <span style="--t: 4.4s;">p</span>
              <span style="--t: 4.6s;">p</span>
              <span style="--t: 4.8s;">y</span>
            </h1>
            <h1 class="birthday">
              <span style="--t: 5s;">B</span>
              <span style="--t: 5.2s;">i</span>
              <span style="--t: 5.4s;">r</span>
              <span style="--t: 5.6s;">t</span>
              <span style="--t: 5.8s;">h</span>
              <span style="--t: 6s;">d</span>
              <span style="--t: 6.2s;">a</span>
              <span style="--t: 6.4s;">y</span>
            </h1>
            <div class="hat">
              <img src="./images/hat.png" alt="" width="130" />
            </div>
          </div>
          <div class="date__of__birth">
            <span></span>
          </div>
          <button id="btn__letter" class="btn">Open Letter <i class="fa-solid fa-heart"></i></button>
        </div>
        <div class="right">
          <div class="box__account">
            <div class="image">
              <img
                src="./images/2908.png"
                alt=""
              />
            </div>
            <div class="name">
              <i class="fa-solid fa-heart"></i>
              <span>Nhật_Duy</span>
              <i class="fa-solid fa-heart"></i>
            </div>
            <div class="balloon_one">
              <img width="100px" src="./images/balloon1.png" alt="" />
            </div>
            <div class="balloon_two">
              <img width="100px" src="./images/balloon2.png" alt="" />
            </div>
          </div>
    
        </div>
      </div>
      <div class="decorate_star star1" style="--t: 15s;"></div>
      <div class="decorate_star star2" style="--t: 15.2s;"></div>
      <div class="decorate_star star3" style="--t: 15.4s;"></div>
      <div class="decorate_star star4" style="--t: 15.6s;"></div>
      <div class="decorate_star star5" style="--t: 15.8s;"></div>

      <div class="box__letter">
        <div class="letter__border">
          <div class="letter">
            <div class="title__letter"></div>
            <div class="content__letter">
              <div class="left">
                <img
                  id="heart__letter"
                  src="https://media.giphy.com/media/YKUvclrGYmDKXwtphf/giphy.gif"
                  alt=""
                />
                <img
                  class="heart heart_1"
                  style="--t: 0.2s"
                  width="20"
                  src="./images/heart.png"
                  alt=""
                />
                <img
                  class="heart heart_2"
                  style="--t: 0.4s"
                  width="20"
                  src="./images/heart.png"
                  alt=""
                />
                <img
                  class="heart heart_3"
                  style="--t: 0.6s"
                  width="20"
                  src="./images/heart.png"
                  alt=""
                />
                <img
                  class="heart heart_4"
                  style="--t: 0.8s"
                  width="20"
                  src="./images/heart.png"
                  alt=""
                />
              </div>
              <div class="right">
                <div class="love__img">
                  <img
                    src="https://media.giphy.com/media/m85llaN7ZkFIHtURiC/giphy.gif"
                    alt=""
                    width="220"
                  />
                </div>
                <div class="text__letter">
                  <p></p>
                </div>
                <img id="mewmew" width="80" src="./images/mewmew.gif" alt="" />
              </div>
            </div>
          </div>
          <div class="close">
            <i class="fa-solid fa-xmark"></i>
          </div>
        </div>
      </div>
    </div>
  </body>
  <script>
        let datetxt = "29/08/2005";
        let datatxtletter = "Tình yêu của đời anh. Em là một cô gái rất đặc biệt. Anh luôn thầm cảm ơn vì em đã đến bên cạnh anh. Ngày hôm nay anh chúc em mọi điều an lành, thật nhiều sức khỏe, thật nhiều niềm vui. Anh luôn hy vọng mình sẽ luôn cùng nhau đón nhiều sinh nhật như thế này. Mừng sinh nhật em.💕";
        let titleLetter = "Gửi em";
        let charArrDate = datetxt.split('');
        let charArrDateLetter = datatxtletter.split('');
        let charArrTitle = titleLetter.split('');
        let currentIndex = 0;
        let currentIndexLetter = 0;
        let currentIndexTitle = 0;
        let date__of__birth = document.querySelector(".date__of__birth span");
        let text__letter = document.querySelector(".text__letter p");
        setTimeout(function(){
            timeDatetxt = setInterval(function(){
                if(currentIndex < charArrDate.length){
                    date__of__birth.textContent += charArrDate[currentIndex];
                    currentIndex++;
                }
                else{
                    let i = document.createElement("i");
                    i.className = "fa-solid fa-star"
                    document.querySelector(".date__of__birth").prepend(i)
                    document.querySelector(".date__of__birth").appendChild(i.cloneNode(true))
                    clearInterval(timeDatetxt)
                }
            },100)
        },3500)

        var intervalContent;
        var intervalTitle;
       
       document.addEventListener("DOMContentLoaded", function() {
        // Check if the page has been reloaded
        // Removed redirect to "/" to fix GitHub Pages path issues
        // if (performance.navigation.type === 1) {
        //     window.location.href = "/";
        // }
    });

    // Add event listener for the letter button
    document.getElementById('btn__letter').addEventListener('click', function() {
        document.querySelector('.box__letter').style.display = 'flex';
        document.querySelector('.letter__border').style.display = 'block';
        // Add animation classes
        document.getElementById('heart__letter').classList.add('animationOp');
        document.querySelector('.love__img').classList.add('animationOp');
        document.getElementById('mewmew').classList.add('animationOp');
        document.querySelectorAll('.heart').forEach(heart => heart.classList.add('animation'));
        // Start typing title
        intervalTitle = setInterval(function(){
            if(currentIndexTitle < charArrTitle.length){
                document.querySelector('.title__letter').textContent += charArrTitle[currentIndexTitle];
                currentIndexTitle++;
            } else {
                clearInterval(intervalTitle);
            }
        }, 100);
        // Start typing content
        intervalContent = setInterval(function(){
            if(currentIndexLetter < charArrDateLetter.length){
                document.querySelector('.text__letter p').textContent += charArrDateLetter[currentIndexLetter];
                currentIndexLetter++;
            } else {
                clearInterval(intervalContent);
            }
        }, 50);
    });

    // Close button
    document.querySelector('.close').addEventListener('click', function() {
        document.querySelector('.box__letter').style.display = 'none';
        document.querySelector('.letter__border').style.display = 'none';
        // Remove animation classes
        document.getElementById('heart__letter').classList.remove('animationOp');
        document.querySelector('.love__img').classList.remove('animationOp');
        document.getElementById('mewmew').classList.remove('animationOp');
        document.querySelectorAll('.heart').forEach(heart => heart.classList.remove('animation'));
        // Reset for replay
        currentIndexTitle = 0;
        currentIndexLetter = 0;
        document.querySelector('.title__letter').textContent = '';
        document.querySelector('.text__letter p').textContent = '';
    });
  </script>
</html>
